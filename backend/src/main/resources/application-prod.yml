server:
  port: 8080

spring:
  datasource:
    # 这里的 db 是 docker-compose 中 mysql 服务的名字
    url: jdbc:mysql://db:3306/todolist_db?useUnicode=true&characterEncoding=utf-8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
    username: root
    password: ${MYSQL_ROOT_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver

mybatis:
  mapper-locations: classpath:mapper/*.xml
  configuration:
    map-underscore-to-camel-case: true

ai:
  base-url: ${AI_BASE_URL:}
  api-key: ${AI_API_KEY:}
  model: ${AI_MODEL:}
  timeout-ms: ${AI_TIMEOUT_MS:30000}
